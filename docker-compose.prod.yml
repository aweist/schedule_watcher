services:
  schedule-watcher:
    image: ghcr.io/${DOCKER_USERNAME}/schedule_watcher:${VERSION:-latest}
    container_name: volleyball-schedule-watcher
    restart: unless-stopped
    environment:
      # Secrets passed via env vars, referenced in config.yaml as ${VAR}
      - API_INSTANCE=${API_INSTANCE}
      - API_COMP_ID=${API_COMP_ID}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}

      # Timezone
      - TZ=${TZ:-America/Denver}

    ports:
      - "${WEB_PORT:-8080}:8080"

    volumes:
      - schedule-data:/data

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  schedule-data:
    driver: local
