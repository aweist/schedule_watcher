root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/schedule-watcher ."
  bin = "./tmp/schedule-watcher"
  full_bin = "dotenv -- ./tmp/schedule-watcher"
  exclude_dir = ["tmp", "data", "docs", "scripts"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "html", "css"]
  delay = 1000

[misc]
  clean_on_exit = true
